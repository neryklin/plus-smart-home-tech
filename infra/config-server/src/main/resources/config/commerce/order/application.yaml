spring:
  datasource:
    url: jdbc:postgresql://localhost:5532/order
    username: order
    password: order
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.http: WARN
    org.springframework.cloud: INFO
    ru.practicum: DEBUG